name: Typecheck and Test

# 验证 PR / push 通过 typecheck + vitest（含 ≥80% 覆盖率门槛）。
# 跟 no-ai-attribution 一起作为 main branch protection 的 required check。
#
# 安全：所有 user-controlled 输入必须用 env: 注入再读，禁止 ${{ github.event.* }}
# 直接拼到 run: 字符串里。本 workflow 不读取任何 user-controlled 字段，无注入面。

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, edited, reopened]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack (auto-pnpm via packageManager field)
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm test:coverage

  bundle-smoke:
    name: bundle-smoke
    # tsup bundle + bin wrapper end-to-end —— unit tests 跑 TS source via
    # vitest，不验证 production bundle 路径（noExternal/external 选择 / shims
    # CJS interop / dist/cli.js 加载 / ESM module resolution）。这个 job 防止
    # tsup config 退化时悄悄变成 cc hook 启动报错。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build tsup bundle
        run: pnpm --filter multi-cc-im build

      - name: Verify dist/cli.js exists
        run: test -f apps/multi-cc-im/dist/cli.js

      - name: Smoke — bin wrapper picks up bundled cli (--version)
        run: |
          out="$(./bin/multi-cc-im --version)"
          test "$out" = "0.0.0"

      - name: Smoke — hook subcommand round-trip (Stop)
        run: |
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"
          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          # Stop hook writes <home>/state/<sid>.Stop.<ISO-ts>; daemon would
          # forward + unlink, but no daemon here so the file persists.
          stop_file_count="$(ls "$MULTI_CC_IM_HOME/state/" 2>/dev/null | grep -c "^$SID\.Stop\." || true)"
          [ "$stop_file_count" -eq 1 ]
          # The Stop file content is JSON with last_assistant_message.
          stop_file="$(ls "$MULTI_CC_IM_HOME/state/$SID.Stop."* | head -1)"
          grep -q '"last_assistant_message":"hi"' "$stop_file"
          # No legacy files written.
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.events.jsonl"
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.last-hook-at"
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.cc-pid"

      - name: Smoke — bin wrapper falls back to tsx when dist absent
        run: |
          rm -rf apps/multi-cc-im/dist
          out="$(./bin/multi-cc-im --version)"
          test "$out" = "0.0.0"
