name: Typecheck and Test

# 验证 PR / push 通过 typecheck + vitest（含 ≥80% 覆盖率门槛）。
# 跟 no-ai-attribution 一起作为 main branch protection 的 required check。
#
# 安全：所有 user-controlled 输入必须用 env: 注入再读，禁止 ${{ github.event.* }}
# 直接拼到 run: 字符串里。本 workflow 不读取任何 user-controlled 字段，无注入面。

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, edited, reopened]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack (auto-pnpm via packageManager field)
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm test:coverage

  bundle-smoke:
    name: bundle-smoke
    # tsup bundle + bin wrapper end-to-end —— unit tests 跑 TS source via
    # vitest，不验证 production bundle 路径（noExternal/external 选择 / shims
    # CJS interop / dist/cli.js 加载 / ESM module resolution）。这个 job 防止
    # tsup config 退化时悄悄变成 cc hook 启动报错。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build tsup bundle
        run: pnpm --filter multi-cc-im build

      - name: Verify dist/cli.js exists
        run: test -f apps/multi-cc-im/dist/cli.js

      - name: Smoke — bin wrapper picks up bundled cli (--version)
        run: |
          out="$(./bin/multi-cc-im --version)"
          test "$out" = "0.0.0"

      - name: Smoke — Stop hook short-circuits in local mode (no IMWork)
        # Per [DD: daemon liveness](docs/superpowers/specs/2026-05-09-daemon-liveness-dd.md)
        # + [DD: IMWork+IMOrigin](docs/superpowers/specs/2026-05-08-imwork-imorigin-dd.md):
        # Stop hook returns void without writing anything when IMWork is
        # absent (= user is in local mode). state/ dir won't even be
        # created since no atomicWrite is invoked.
        run: |
          set -x
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"
          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          # Hook E1 short-circuit → no Stop file, no legacy files, no state/ dir at all.
          test ! -d "$MULTI_CC_IM_HOME/state" || {
            echo "FAIL: state/ should not exist after short-circuit"
            ls -la "$MULTI_CC_IM_HOME/state/"
            exit 1
          }

      - name: Smoke — Stop hook writes Stop file in IM mode (forward path)
        # When IMWork + IMOrigin + daemon.pid are all set, Stop hook writes
        # <home>/state/<sid>.Stop.<ISO-ts> as before. Daemon would forward +
        # unlink, but no daemon here so the file persists.
        run: |
          set -x
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"

          # Set up forward-path prerequisites: IMWork tombstone + IMOrigin
          # ctx + daemon.pid pointing at this shell (PID + lstart match so
          # isDaemonAlive returns true).
          mkdir -p "$MULTI_CC_IM_HOME/state"
          : > "$MULTI_CC_IM_HOME/state/IMWork"
          echo '{"contextToken":"smoke-test"}' > "$MULTI_CC_IM_HOME/state/${SID}.IMOrigin"
          SHELL_PID=$$
          # `ps -o lstart=` output is whitespace-padded; trim leading/trailing.
          LSTART="$(ps -o lstart= -p "$SHELL_PID" | sed 's/^ *//;s/ *$//')"
          # Use jq to ensure the JSON escaping of LSTART is correct (the
          # string contains spaces and may contain colons — both safe but
          # jq is the canonical way).
          jq -n --argjson pid "$SHELL_PID" --arg startedAt "$LSTART" \
            '{pid:$pid, startedAt:$startedAt}' \
            > "$MULTI_CC_IM_HOME/state/daemon.pid"

          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          ls -la "$MULTI_CC_IM_HOME/state/"

          shopt -s nullglob
          stop_files=("$MULTI_CC_IM_HOME/state/$SID".Stop.*)
          [ "${#stop_files[@]}" -eq 1 ]
          # The Stop file content is JSON (atomicWrite uses 2-space pretty-print)
          # so match the field name + value separately rather than rely on
          # exact whitespace.
          grep -q 'last_assistant_message' "${stop_files[0]}"
          grep -q '"hi"' "${stop_files[0]}"
          # No legacy files written.
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.events.jsonl"
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.last-hook-at"
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.cc-pid"

      - name: Smoke — bin wrapper falls back to tsx when dist absent
        run: |
          rm -rf apps/multi-cc-im/dist
          out="$(./bin/multi-cc-im --version)"
          test "$out" = "0.0.0"
