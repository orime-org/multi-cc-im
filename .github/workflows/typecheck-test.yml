name: Typecheck and Test

# 验证 PR / push 通过 typecheck + vitest（含 ≥80% 覆盖率门槛）。
# 跟 no-ai-attribution 一起作为 main branch protection 的 required check。
#
# 安全：所有 user-controlled 输入必须用 env: 注入再读，禁止 ${{ github.event.* }}
# 直接拼到 run: 字符串里。本 workflow 不读取任何 user-controlled 字段，无注入面。

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, edited, reopened]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack (auto-pnpm via packageManager field)
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm test:coverage

  bundle-smoke:
    name: bundle-smoke
    # tsup bundle + bin wrapper end-to-end —— unit tests 跑 TS source via
    # vitest，不验证 production bundle 路径（noExternal/external 选择 / shims
    # CJS interop / dist/cli.js 加载 / ESM module resolution）。这个 job 防止
    # tsup config 退化时悄悄变成 cc hook 启动报错。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build tsup bundle
        run: pnpm --filter multi-cc-im build

      - name: Verify dist/cli.js exists
        run: test -f apps/multi-cc-im/dist/cli.js

      - name: Smoke — bin wrapper picks up bundled cli (--version)
        run: |
          out="$(./bin/multi-cc-im --version)"
          # Loose semver shape check, NOT a literal version compare —
          # avoids manually bumping this string on every release. cli.ts
          # VERSION constant itself is the source of truth.
          [[ "$out" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Smoke — Stop hook silently exits when WEZTERM_PANE undefined
        # Per [DD: pane-keyed state files](docs/superpowers/specs/2026-05-08-pane-keyed-state-files-dd.md):
        # the hook receiver entry-gates on WEZTERM_PANE. Without it the hook
        # silently exits without touching disk — multi-cc-im does not bridge
        # cc instances running outside wezterm (ssh / VS Code terminal / etc.).
        run: |
          set -x
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          unset WEZTERM_PANE
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"
          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          test ! -d "$MULTI_CC_IM_HOME/state" || {
            echo "FAIL: state/ should not exist when WEZTERM_PANE undefined"
            ls -la "$MULTI_CC_IM_HOME/state/"
            exit 1
          }

      - name: Smoke — Stop hook short-circuits in local mode (WEZTERM_PANE set, no IMWezterm)
        # Per DD #61 + [DD: IMWork+IMOrigin] + issue 378 split: even with
        # WEZTERM_PANE set, Stop hook short-circuits when the per-terminal
        # `IMWezterm` file is absent (= user in local mode for this
        # terminal). state/ dir won't be created since no atomicWrite runs.
        run: |
          set -x
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          export WEZTERM_PANE=42
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"
          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          test ! -d "$MULTI_CC_IM_HOME/state" || {
            echo "FAIL: state/ should not exist after IMWork-off short-circuit"
            ls -la "$MULTI_CC_IM_HOME/state/"
            exit 1
          }

      - name: Smoke — Stop hook writes <paneId>_<sid>.Stop file in IM mode (forward path)
        # When WEZTERM_PANE + IMWezterm + global IMOrigin + daemon.pid are
        # all set, Stop hook writes <home>/state/<paneId>_<sid>.Stop.<ISO-ts>.
        # Daemon would forward + unlink, but no daemon here so the file
        # persists.
        #
        # Per issue 378 split: IMWork was renamed to per-terminal
        # `IM<TermType>` files. With `WEZTERM_PANE=42` set, the hook
        # detects termId='wezterm' and reads `IMWezterm` (not the legacy
        # `IMWork`).
        run: |
          set -x
          export MULTI_CC_IM_HOME="$(mktemp -d)"
          export WEZTERM_PANE=42
          SID="11111111-3606-4fe4-b01d-aaaaaaaaaaaa"

          # Set up forward-path prerequisites per DD #61 + DD: IMOrigin global:
          #   - IMWezterm tombstone (per-terminal IMWork — issue 378 split)
          #   - state/IMOrigin (global, no paneId — overwritten by every inbound)
          #   - daemon.pid pointing at this shell (PID + lstart match)
          mkdir -p "$MULTI_CC_IM_HOME/state"
          : > "$MULTI_CC_IM_HOME/state/IMWezterm"
          echo '{"imType":"wechat","to":"u","contextToken":"smoke-test"}' \
            > "$MULTI_CC_IM_HOME/state/IMOrigin"
          SHELL_PID=$$
          LSTART="$(ps -o lstart= -p "$SHELL_PID" | sed 's/^ *//;s/ *$//')"
          jq -n --argjson pid "$SHELL_PID" --arg startedAt "$LSTART" \
            '{pid:$pid, startedAt:$startedAt}' \
            > "$MULTI_CC_IM_HOME/state/daemon.pid"

          PAYLOAD='{"session_id":"'"$SID"'","transcript_path":"/tmp/x.jsonl","cwd":"/tmp","hook_event_name":"Stop","permission_mode":"default","stop_hook_active":false,"last_assistant_message":"hi"}'
          echo "$PAYLOAD" | ./bin/multi-cc-im hook Stop
          ls -la "$MULTI_CC_IM_HOME/state/"

          shopt -s nullglob
          stop_files=("$MULTI_CC_IM_HOME/state/${WEZTERM_PANE}_${SID}".Stop.*)
          [ "${#stop_files[@]}" -eq 1 ]
          grep -q 'last_assistant_message' "${stop_files[0]}"
          grep -q '"hi"' "${stop_files[0]}"
          # SessionStart / SessionEnd no longer subscribed (DD #61).
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.SessionStart"
          ! test -f "$MULTI_CC_IM_HOME/state/$SID.SessionEnd"

      - name: Smoke — bin wrapper falls back to tsx when dist absent
        run: |
          rm -rf apps/multi-cc-im/dist
          out="$(./bin/multi-cc-im --version)"
          [[ "$out" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
